<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Four</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f7f8f5;
      --paper: rgba(255, 255, 255, 0.92);
      --ink: #263331;
      --muted: #5d716d;
      --line: rgba(119, 154, 146, 0.18);
      --accent: #6f948d;
      --accent-soft: rgba(111, 148, 141, 0.1);
      --shadow: 0 18px 36px rgba(84, 108, 103, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(155, 186, 180, 0.1), transparent 24%),
        linear-gradient(180deg, #fafbf9 0%, #f2f5f3 100%);
    }

    .page {
      width: min(900px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 64px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 54px;
    }

    .brand,
    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.08rem;
    }

    .content {
      max-width: 700px;
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(3rem, 6vw, 4.6rem);
      line-height: 0.96;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.18rem;
      line-height: 1.72;
    }

    @media (max-width: 720px) {
      .page { width: min(900px, calc(100% - 28px)); }
      .nav { flex-direction: column; align-items: flex-start; }
      .content { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <a class="brand" href="index.html">Ziyi Ren</a>
      <a href="projects.html">Project Directory</a>
    </header>

    <section class="content">
      <span class="eyebrow">Placeholder</span>
      <h1>Project Four</h1>
      <p>This page is reserved for future portfolio content. It can later hold a project summary, visual material, process notes, and final outcomes.</p>
    </section>
  </main>
</body>
</html>
